name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-coverage:
    name: Unit Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest coverage gate
        run: npm run ci:test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  ssg-build:
    name: SSG Build
    runs-on: ubuntu-latest
    needs: unit-coverage
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static portfolio
        run: npm run ci:build

      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  browser-smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    needs: ssg-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static portfolio
        run: npm run ci:build

      - name: Run Cypress smoke specs
        run: |
          PORT=4200 npm run serve:ssg > /tmp/portfolio-ssg.log 2>&1 &
          ready=0
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4200/en/ >/dev/null; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            cat /tmp/portfolio-ssg.log
            exit 1
          fi
          npm run test:cypress:smoke -- --config baseUrl=http://127.0.0.1:4200

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
