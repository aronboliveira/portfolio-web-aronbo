[build]
  publish = "dist/portfolio-web-aronbo-ng/browser"
  command = "npx ng build --configuration production"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_PREFER_ONLINE = "true"

# Serve static files first, then fallback to index.html for SPA routing
[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production.environment]
  NODE_ENV = "production"

# ── Cache headers ──────────────────────────────────────────
# Favicon: short cache + revalidate so CDN picks up changes quickly
[[headers]]
  for = "/dev_aronbo_favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type  = "image/svg+xml"

# SEO / OG logo: cache for 1 day, revalidate after
[[headers]]
  for = "/logo_aronb_dev-630.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type  = "image/webp"

# Long cache for other static images (fingerprinted by Angular build)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"