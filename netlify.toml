[build]
  publish = "dist/portfolio-web-aronbo-ng/browser"
  command = "npx ng build --configuration production"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_PREFER_ONLINE = "true"

# Serve static files first, then fallback to index.html for SPA routing
[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production.environment]
  NODE_ENV = "production"